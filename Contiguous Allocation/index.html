<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ STEP 1: Always link global.css FIRST — DO NOT change this line -->
  <link rel="stylesheet" href="../global.css" />

  <!-- ✅ STEP 2: Then link YOUR module's CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- 🔧 CHANGE THIS: Replace with your module name -->
  <title>Module 09 — Contiguous Memory Allocation</title>
</head>
<body>

  <!-- ============================================================
       MODULE WRAPPER — Do not remove this div
  ============================================================ -->
  <div class="module-wrapper">

    <!-- ── MODULE HEADER ─────────────────────────────────────── -->
    <!-- 🔧 CHANGE: icon emoji, module number, title, description -->
    <div class="module-header">
      <div class="module-icon">📦</div>
      <div class="module-title">
        <h1>Module 09 — Contiguous Memory Allocation</h1>
        <p class="text-muted">Compare Best-Fit, Next-Fit, and Worst-Fit allocation strategies with memory fragmentation analysis.</p>
      </div>
    </div>

    <!-- ── INPUT SECTION ─────────────────────────────────────── -->
    <!-- 🔧 CHANGE: Add your own input fields below this comment -->
    <!-- Keep using class="input-group", "input-field", "btn" etc -->
    <div class="card">
      <h3>Simulation Parameters</h3>
      <hr class="divider" />

      <!-- Total Memory Size -->
      <div class="input-group">
        <label for="totalMemory">Total Memory Size (KB)</label>
        <input
          type="number"
          id="totalMemory"
          class="input-field"
          placeholder="e.g. 1024"
          value="1024"
          min="256"
          max="4096"
        />
      </div>

      <!-- Allocation Strategy -->
      <div class="input-group">
        <label for="strategy">Allocation Strategy</label>
        <select id="strategy" class="input-field">
          <option value="best-fit">Best Fit (Lab Algorithm)</option>
          <option value="next-fit">Next Fit (Lab Algorithm)</option>
          <option value="worst-fit">Worst Fit (New Algorithm)</option>
        </select>
      </div>

      <!-- Process Requests -->
      <div class="input-group">
        <label for="processes">Process Allocation Requests (Format: "name:size" space-separated)</label>
        <input
          type="text"
          id="processes"
          class="input-field"
          placeholder="e.g. P1:300 P2:200 P3:150 P4:250"
        />
      </div>

      <!-- ── BUTTONS ──────────────────────────────────────────── -->
      <!-- Keep these class names — they style automatically -->
      <div class="btn-row">
        <button class="btn btn-primary" onclick="runSimulation()">
          ▶ Run Simulation
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">
          ↺ Reset
        </button>
      </div>

      <!-- Error message box — shown by JS when input is wrong -->
      <div id="error-msg" class="alert alert-error hidden"></div>
    </div>

    <!-- ── OUTPUT SECTION ────────────────────────────────────── -->
    <!-- 🔧 DO NOT rename id="visual-output" — integration depends on it -->
    <div id="visual-output">
      <div class="output-placeholder">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 17v-2m3 2v-4m3 4v-6M3 21h18M3 10l9-7 9 7" />
        </svg>
        <p>Results will appear here after you run the simulation.</p>
      </div>
    </div>

  </div><!-- /module-wrapper -->

  <!-- ✅ STEP 3: Link YOUR script last -->
  <script src="script.js"></script>
</body>
</html>
