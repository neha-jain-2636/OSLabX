<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../global.css" />
  <link rel="stylesheet" href="style.css" />
  <title>Contiguous Memory Allocation</title>
</head>
<body>
  <div class="module-wrapper">
    <div class="module-header">
      <div class="module-icon">📦</div>
      <div class="module-title">
        <h1>Contiguous Memory Allocation</h1>
        <p class="text-muted">Compare Best-Fit, Next-Fit, and Worst-Fit allocation strategies with actual memory fragmentation.</p>
      </div>
    </div>

    <div class="card">
      <h3>Simulation Parameters</h3>
      <hr class="divider" />

      <div class="input-group">
        <label for="totalMemory">Total Memory Size (KB)</label>
        <input
          type="number"
          id="totalMemory"
          class="input-field"
          placeholder="e.g. 1000"
          value="1000"
          min="256"
          max="4096"
        />
      </div>

      <div class="input-group">
        <label for="blocks">Memory Blocks (Free block sizes separated by space)</label>
        <input
          type="text"
          id="blocks"
          class="input-field"
          placeholder="e.g. 300 200 150 350"
          value="300 200 150 350"
        />
        <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 4px;">
          💡 Sum of blocks must equal total memory. Example: 300+200+150+350 = 1000
        </small>
      </div>

      <div class="input-group">
        <label for="strategy">Allocation Strategy</label>
        <select id="strategy" class="input-field">
          <option value="best-fit">Best Fit (Picks SMALLEST block that fits)</option>
          <option value="next-fit">Next Fit (Continue from last position)</option>
          <option value="worst-fit">Worst Fit (Picks LARGEST block that fits)</option>
        </select>
      </div>

      <div class="input-group">
        <label for="processes">Process Allocation Requests (Format: "name:size" space-separated)</label>
        <input
          type="text"
          id="processes"
          class="input-field"
          placeholder="e.g. P1:250 P2:150 P3:200 P4:100"
          value="P1:250 P2:150 P3:200 P4:100"
        />
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="runSimulation()">
          ▶ Run Simulation
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">
          ↺ Reset
        </button>
      </div>

      <div id="error-msg" class="alert alert-error hidden"></div>
    </div>

    <div id="visual-output">
      <div class="output-placeholder">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 17v-2m3 2v-4m3 4v-6M3 21h18M3 10l9-7 9 7" />
        </svg>
        <p>Results will appear here after you run the simulation.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
